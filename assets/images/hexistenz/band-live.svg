<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b90f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#grad5)"/>
  <!-- Stage scene -->
  <!-- Spotlight effect -->
  <circle cx="200" cy="100" r="100" fill="rgba(185,15,15,0.2)"/>
  <!-- Band silhouette -->
  <!-- Vocalist center -->
  <circle cx="200" cy="140" r="40" fill="#1a1a1a"/>
  <rect x="185" y="180" width="30" height="80" fill="#1a1a1a"/>
  <!-- Guitarist left -->
  <circle cx="120" cy="160" r="35" fill="#2a2a2a"/>
  <rect x="110" y="195" width="20" height="70" fill="#2a2a2a"/>
  <!-- Bassist right -->
  <circle cx="280" cy="160" r="35" fill="#2a2a2a"/>
  <rect x="270" y="195" width="20" height="70" fill="#2a2a2a"/>
  <!-- Drummer back -->
  <circle cx="200" cy="100" r="30" fill="#3a3a3a"/>
  <!-- Stage -->
  <rect x="0" y="280" width="400" height="120" fill="#0a0a0a" stroke="#b90f0f" stroke-width="2"/>
  <!-- Stage lights -->
  <circle cx="50" cy="270" r="8" fill="#b90f0f" opacity="0.6"/>
  <circle cx="150" cy="270" r="8" fill="#b90f0f" opacity="0.6"/>
  <circle cx="250" cy="270" r="8" fill="#b90f0f" opacity="0.6"/>
  <circle cx="350" cy="270" r="8" fill="#b90f0f" opacity="0.6"/>
  <!-- Text -->
  <text x="200" y="360" font-size="20" font-weight="bold" text-anchor="middle" fill="#b90f0f" font-family="Arial">HEXISTENZ LIVE</text>
</svg>