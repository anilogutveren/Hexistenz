<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#grad6)"/>
  <!-- Vinyl record effect -->
  <circle cx="200" cy="200" r="180" fill="#1a1a1a" stroke="#b90f0f" stroke-width="3"/>
  <circle cx="200" cy="200" r="160" fill="#0a0a0a" stroke="#666" stroke-width="1"/>
  <!-- Concentric circles (vinyl grooves) -->
  <circle cx="200" cy="200" r="120" fill="none" stroke="#333" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#333" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="200" r="40" fill="none" stroke="#333" stroke-width="1" opacity="0.5"/>
  <!-- Center label -->
  <circle cx="200" cy="200" r="30" fill="#b90f0f"/>
  <circle cx="200" cy="200" r="20" fill="#1a1a1a"/>
  <circle cx="200" cy="200" r="10" fill="#b90f0f"/>
  <!-- Title on label -->
  <text x="200" y="205" font-size="10" font-weight="bold" text-anchor="middle" fill="#1a1a1a" font-family="Arial">HEXISTENZ</text>
  <!-- Highlight effect -->
  <ellipse cx="150" cy="150" rx="60" ry="40" fill="rgba(255,255,255,0.1)"/>
</svg>