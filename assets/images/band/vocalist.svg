<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a0000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#grad1)"/>
  <!-- Head circle -->
  <circle cx="200" cy="120" r="60" fill="#d4a574"/>
  <!-- Body -->
  <rect x="160" y="190" width="80" height="140" rx="10" fill="#1a1a1a"/>
  <!-- Arm left -->
  <rect x="80" y="200" width="80" height="30" rx="15" fill="#1a1a1a"/>
  <!-- Arm right -->
  <rect x="240" y="200" width="80" height="30" rx="15" fill="#1a1a1a"/>
  <!-- Hair/Head detail -->
  <path d="M 160 90 Q 140 80 140 110 Q 140 130 160 140" fill="#1a1a1a"/>
  <path d="M 240 90 Q 260 80 260 110 Q 260 130 240 140" fill="#1a1a1a"/>
  <!-- Face features -->
  <circle cx="185" cy="110" r="6" fill="#1a1a1a"/>
  <circle cx="215" cy="110" r="6" fill="#1a1a1a"/>
  <line x1="200" y1="130" x2="200" y2="145" stroke="#8b0000" stroke-width="3"/>
  <!-- Guitar silhouette -->
  <ellipse cx="280" cy="280" rx="35" ry="55" fill="#3a3a3a"/>
  <rect x="275" y="240" width="10" height="80" fill="#1a1a1a"/>
</svg>