<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b90f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#600000;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#grad2)"/>
  <!-- Head -->
  <circle cx="200" cy="120" r="60" fill="#c9a876"/>
  <!-- Body -->
  <rect x="160" y="190" width="80" height="140" rx="10" fill="#1a1a1a"/>
  <!-- Arm left with guitar -->
  <rect x="80" y="210" width="80" height="25" rx="12" fill="#1a1a1a"/>
  <!-- Arm right -->
  <rect x="240" y="210" width="80" height="25" rx="12" fill="#1a1a1a"/>
  <!-- Guitar body -->
  <ellipse cx="100" cy="260" rx="40" ry="60" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="2"/>
  <rect x="95" y="220" width="10" height="100" fill="#2a2a2a"/>
  <!-- Guitar strings -->
  <line x1="100" y1="230" x2="100" y2="300" stroke="#888" stroke-width="1"/>
  <line x1="105" y1="230" x2="105" y2="300" stroke="#888" stroke-width="1"/>
  <line x1="110" y1="230" x2="110" y2="300" stroke="#888" stroke-width="1"/>
  <!-- Head detail -->
  <path d="M 155 90 Q 140 75 140 110 Q 145 135 160 140" fill="#1a1a1a"/>
  <!-- Face -->
  <circle cx="185" cy="110" r="5" fill="#1a1a1a"/>
  <circle cx="215" cy="110" r="5" fill="#1a1a1a"/>
</svg>